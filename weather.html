```html
<!DOCTYPE html>
<html>
<head>
<title>Weather Information</title>

<style>
body{
    background:black;
    color:cyan;
    font-family:monospace;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid cyan;
    padding:10px;
}

input{
    background:black;
    color:cyan;
    border:1px solid cyan;
    padding:8px;
}

button{
    padding:8px;
}
</style>

</head>
<body>

<h1>✈ WEATHER INFORMATION</h1>

<input
id="airport-code"
placeholder="Airport ICAO (VIDP, VOBL, EGLL...)">

<button onclick="getWeather()">
SEARCH
</button>

<br><br>

<table>

<tr>
<th>Parameter</th>
<th>Value</th>
</tr>

<tr>
<td>Airport</td>
<td id="airport">---</td>
</tr>

<tr>
<td>Temperature</td>
<td id="temperature">---</td>
</tr>

<tr>
<td>Humidity</td>
<td id="humidity">---</td>
</tr>

<tr>
<td>Pressure</td>
<td id="pressure">---</td>
</tr>

<tr>
<td>Wind Speed</td>
<td id="wind-speed">---</td>
</tr>

<tr>
<td>Wind Direction</td>
<td id="wind-direction">---</td>
</tr>

<tr>
<td>Visibility</td>
<td id="visibility">---</td>
</tr>

<tr>
<td>Cloud Cover</td>
<td id="cloud-cover">---</td>
</tr>

<tr>
<td>Rainfall</td>
<td id="rainfall">---</td>
</tr>

<tr>
<td>METAR</td>
<td id="metar">---</td>
</tr>

<tr>
<td>TAF</td>
<td id="taf">---</td>
</tr>

</table>

<script>

function getWeather() {

    let code = document.getElementById("airport-code").value.toUpperCase();

    document.getElementById("airport").innerHTML = code;
    document.getElementById("temperature").innerHTML = "32°C";
    document.getElementById("humidity").innerHTML = "60%";
    document.getElementById("pressure").innerHTML = "1013 hPa";
    document.getElementById("wind-speed").innerHTML = "12 kt";
    document.getElementById("wind-direction").innerHTML = "280°";
    document.getElementById("visibility").innerHTML = "10 km";
    document.getElementById("cloud-cover").innerHTML = "20%";
    document.getElementById("rainfall").innerHTML = "0 mm";

    document.getElementById("metar").innerHTML =
    "VIDP 150900Z 28012KT 9999 FEW020 32/20 Q1013";

    document.getElementById("taf").innerHTML =
    "TAF VIDP 150900Z 28012KT CAVOK";

}

</script>

</body>
</html>
```
