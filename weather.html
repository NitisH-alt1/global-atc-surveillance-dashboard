<!DOCTYPE html>
<html>
<head>
<title>Weather Information</title>

<style>
body{
    background:black;
    color:cyan;
    font-family:monospace;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid cyan;
    padding:10px;
}

input{
    background:black;
    color:cyan;
    border:1px solid cyan;
    padding:8px;
}

button{
    padding:8px;
}
</style>

</head>
<body>

<h1>✈ WEATHER INFORMATION</h1>

<input
id="airport-code"
placeholder="Airport ICAO (VIDP, VOBL, EGLL...)">

<button onclick="getWeather()">
SEARCH
</button>

<br><br>

<table>

<tr>
<th>Parameter</th>
<th>Value</th>
</tr>

<tr>
<td>Airport</td>
<td id="airport">---</td>
</tr>

<tr>
<td>Temperature</td>
<td id="temp">---</td>
</tr>

<tr>
<td>Wind</td>
<td id="wind">---</td>
</tr>

<tr>
<td>Visibility</td>
<td id="vis">---</td>
</tr>

<tr>
<td>Pressure</td>
<td id="pressure">---</td>
</tr>

<tr>
<td>Condition</td>
<td id="condition">---</td>
</tr>

</table>

<script>

function getWeather(){

let code=document.getElementById("airport-code").value.toUpperCase();

document.getElementById("airport").innerHTML=code;
document.getElementById("temp").innerHTML="32°C";
document.getElementById("wind").innerHTML="280° / 12 kt";
document.getElementById("vis").innerHTML="10 km";
document.getElementById("pressure").innerHTML="1013 hPa";
document.getElementById("condition").innerHTML="Clear";

}

</script>

</body>
</html>
