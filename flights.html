<!DOCTYPE html>
<html>
<head>
<title>Flight Details</title>

<style>
body{
background:black;
color:cyan;
font-family:monospace;
}

table{
width:80%;
border-collapse:collapse;
}

td,th{
border:1px solid cyan;
padding:8px;
}
</style>

</head>

<body>

<h1>✈ FLIGHT DETAILS</h1>
  <div style="margin-bottom:20px;">

<input
type="text"
id="flight-search"
placeholder="Enter Flight Number or Callsign"
style="
background:black;
color:cyan;
border:1px solid cyan;
padding:8px;
width:300px;
">

<button onclick="searchFlight()">
SEARCH
</button>

</div>

<table>

<tr>
<th>Parameter</th>
<th>Value</th>
</tr>

<tr>
    <td>Flight Number</td>
    <td id="flight-number">---</td>
</tr>
<tr>
    <td>Callsign</td>
    <td id="callsign">---</td>
</tr>
<tr>
    <td>ICAO24</td>
    <td id="icao24">---</td>
</tr>
<tr>
    <td>Aircraft</td>
    <td id="aircraft">---</td>
</tr>
<tr>
    <td>Departure</td>
    <td id="dep">---</td>
</tr>
<tr>
    <td>Arrival</td>
    <td id="arr">---</td>
</tr>
<tr>
    <td>Altitude</td>
    <td id="altitude">---</td>
</tr>
<tr>
    <td>Speed</td>
    <td id="speed">---</td>
</tr>
<tr>
    <td>Headin  g</td>
    <td id="heading">---</td>
</tr>
<tr>
    <td>ETA</td>
    <td id="eta">---</td>
</tr>
<tr>
    <td>Delay</td>
    <td id="delay">---</td>
</tr>

</table>
<script>
function searchFlight() {

    const query = document.getElementById("flight-search").value;

    document.getElementById("flight-number").innerHTML = query.toUpperCase();
    document.getElementById("callsign").innerHTML = "AI102";
    document.getElementById("icao24").innerHTML = "800123";
    document.getElementById("aircraft").innerHTML = "Airbus A320";
    document.getElementById("dep").innerHTML = "DEL";
    document.getElementById("arr").innerHTML = "BOM";
    document.getElementById("altitude").innerHTML = "35000 ft";
    document.getElementById("speed").innerHTML = "470 knots";
    document.getElementById("heading").innerHTML = "270°";
    document.getElementById("eta").innerHTML = "17:45 UTC";
    document.getElementById("delay").innerHTML = "0 min";

}
<script>
function searchFlight() {

    const query = document.getElementById("flight-search").value;

    document.getElementById("flight-number").innerHTML = query.toUpperCase();
    document.getElementById("callsign").innerHTML = "AI102";
    document.getElementById("icao24").innerHTML = "800123";
    document.getElementById("aircraft").innerHTML = "Airbus A320";
    document.getElementById("dep").innerHTML = "DEL";
    document.getElementById("arr").innerHTML = "BOM";
    document.getElementById("altitude").innerHTML = "35000 ft";
    document.getElementById("speed").innerHTML = "470 knots";
    document.getElementById("heading").innerHTML = "270°";
    document.getElementById("eta").innerHTML = "17:45 UTC";
    document.getElementById("delay").innerHTML = "0 min";

}
</script>
</body>
</html>
