<!DOCTYPE html>
<html>
<head>
<title>ATC Communications</title>

<style>
body{
    background:black;
    color:cyan;
    font-family:monospace;
}
</style>

</head>

<body>

<h1>ATC COMMUNICATIONS</h1>

<div id="comms-panel">
    <div id="comms-title">
        <span>📡 ATC COMMS</span>
        <span id="freq-live" style="color:lime;font-size:9px;">122.800 MHz</span>
    </div>

    <div class="comm-btns">
        <button class="comm-btn active" onclick="setCommMode('GND')">GND</button>
        <button class="comm-btn" onclick="setCommMode('TWR')">TWR</button>
        <button class="comm-btn" onclick="setCommMode('APP')">APP</button>
        <button class="comm-btn" onclick="setCommMode('DEP')">DEP</button>
        <button class="comm-btn" onclick="setCommMode('ENR')">ENR</button>
    </div>

    <div id="comm-log"></div>

    <button id="transmit-btn" onclick="transmitClearance()">
        📜 TRANSMIT CLEARANCE
    </button>

</div>

</body>
</html>
